name: Build and deploy to GitHub Pages

# 実行タイミング:
#  - main への push(コード変更時)
#  - 30分ごとのスケジュール実行(ニュースの自動更新のため)
#  - 手動実行(workflow_dispatch)
#
# 補足: news.json の自動コミットもこのワークフロー内で行う。GITHUB_TOKEN による
# pushはGitHub側の仕様で別ワークフローの再トリガーを起こさないため、
# 「更新→ビルド→デプロイ」を1本のワークフローにまとめて完結させている。
#
# 注意: リポジトリのデフォルトブランチがmain以外の場合は、下記refとpush先を
# 実際のデフォルトブランチ名に合わせて書き換え、あわせてリポジトリの
# Settings → Environments → github-pages → Deployment branches and tags で
# そのブランチからのデプロイを許可しておく必要がある(未設定だと
# "environment protection rules" エラーでデプロイが拒否される)。
#
# 重要: concurrency.group は実行トリガーの種類ごとに分けている(下記concurrency
# 参照)。姉妹サイト「Curation NPB」の運用で、"pages" という1つのグループに
# push・schedule・workflow_dispatchすべてをまとめていたところ、GitHub Actions
# のconcurrency仕様上「実行中1件+待機中1件」までしか保持されず、待機中に
# 新しいトリガーが来ると待機中だった方はキャンセルされ新しい方に置き換わる
# という事故が起きたため、最初からトリガー種類ごとにグループを分離している。
# この場合、schedule実行とpush実行が同時に走る可能性が生まれるため、
# git pushがコンフリクトした場合はリベースして再試行するようにしている
# (下記「Commit updated news.json if changed」参照)。
on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.event_name }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Astro 7 は Node.js 22.12.0 以上が必須(20系はビルド時にエラーになる)
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest J1 news
        run: npm run fetch-news

      - name: Commit updated news.json if changed
        run: |
          if git diff --quiet -- src/data/news.json; then
            echo "No data changes."
          else
            git config user.name "jleague-curation-bot"
            git config user.email "actions@users.noreply.github.com"
            git add src/data/news.json
            git commit -m "chore: update news feed"
            # concurrency.groupをトリガー種類ごとに分けたため、schedule実行と
            # push実行のgit pushが同時に走る可能性がある。非fast-forwardで
            # 拒否された場合は最新mainにリベースして再試行する(最大3回)。
            for i in 1 2 3; do
              if git push origin HEAD:main; then
                break
              fi
              echo "push failed (attempt $i/3), rebasing onto latest main and retrying..."
              git fetch origin main
              git rebase origin/main
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
